<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Domain Cleanup{% endblock %}</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f6f9; color: #333; }
  nav { background: #2c3e50; color: #ecf0f1; padding: 12px 24px; display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
  nav a { color: #ecf0f1; text-decoration: none; font-size: 14px; }
  nav a:hover { text-decoration: underline; }
  nav .brand { font-weight: 700; font-size: 16px; margin-right: auto; }
  .container { max-width: 1400px; margin: 20px auto; padding: 0 20px; }
  h1 { margin-bottom: 16px; font-size: 22px; }
  table { width: 100%; border-collapse: collapse; background: #fff; margin-bottom: 20px; font-size: 13px; }
  th, td { border: 1px solid #dee2e6; padding: 6px 10px; text-align: left; }
  th { background: #f8f9fa; font-weight: 600; position: sticky; top: 0; }
  tr:hover { background: #f1f3f5; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 11px; font-weight: 600; }
  .badge-success { background: #27ae60; color: #fff; }
  .badge-danger { background: #e74c3c; color: #fff; }
  .badge-warning { background: #f39c12; color: #fff; }
  .badge-info { background: #3498db; color: #fff; }
  .badge-secondary { background: #95a5a6; color: #fff; }
  form.inline { display: inline; }
  input[type=text] { padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
  button, .btn { padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; color: #fff; }
  .btn-primary { background: #3498db; }
  .btn-danger { background: #e74c3c; }
  .btn-sm { padding: 3px 8px; font-size: 12px; }
  .card { background: #fff; border-radius: 6px; padding: 16px; margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .stats { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
  .stat { background: #fff; border-radius: 6px; padding: 14px 20px; box-shadow: 0 1px 3px rgba(0,0,0,.08); min-width: 140px; }
  .stat .num { font-size: 26px; font-weight: 700; }
  .stat .lbl { font-size: 12px; color: #888; }
  pre { background: #f8f9fa; padding: 10px; border-radius: 4px; font-size: 12px; overflow-x: auto; }
</style>
</head>
<body>
<nav>
  <span class="brand">Domain Cleanup</span>
  <a href="/">Overview</a>
  <a href="/domains">Domains</a>
  <a href="/orders">Orders</a>
  <a href="/drafts">Email Drafts</a>
  <a href="/repeat-offenders">Repeat Offenders</a>
  <a href="/processed">Verwerkt</a>
  <a href="/manual-remove" style="color:#e74c3c;">Handmatig verwijderen</a>
  <a href="/logs">Logs</a>
</nav>
<div class="container">
{% block content %}{% endblock %}
</div>
</body>
</html>
